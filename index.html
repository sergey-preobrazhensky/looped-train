<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Looped Train</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="intro">
      <p class="eyebrow">Task visualization</p>
      <h1>Looped Train</h1>
      <p class="description">
        Enter the number of cars to see a train where the last car is connected to the first one.
      </p>
    </section>

    <section class="controls" aria-label="Visualization settings">
      <div class="count-control">
        <label for="car-count">Number of cars</label>
        <input id="car-count" type="number" min="1" max="1000" value="12" inputmode="numeric">
      </div>

      <div class="light-actions" aria-label="Light controls">
        <button type="button" data-light-action="off">Turn all off</button>
        <button type="button" data-light-action="on">Turn all on</button>
        <button type="button" data-light-action="random">Random</button>
        <button type="button" data-reset-algorithm>Reset</button>
      </div>

      <div class="algorithm-actions" aria-label="Algorithm controls">
        <button type="button" data-algorithm="one">Simple Algorithm</button>
        <button type="button" data-algorithm="two">Bidirectional Algorithm</button>
        <button type="button" data-algorithm="three">Forward Scan Algorithm</button>
        <span id="algorithm-indicator" class="algorithm-indicator" hidden>
          <span class="loader" aria-hidden="true"></span>
          Computing
        </span>
      </div>
    </section>

    <section class="scene" aria-live="polite">
      <div class="scene-tools" aria-label="Algorithm runtime controls">
        <div class="speed-control" aria-label="Speed control">
          <label for="animation-delay">Speed</label>
          <button class="speed-step" type="button" data-speed-step="-1" aria-label="Decrease speed">-</button>
          <input id="animation-delay" type="range" min="0" max="22" value="14">
          <button class="speed-step" type="button" data-speed-step="1" aria-label="Increase speed">+</button>
        </div>
        <button class="stop-button" type="button" data-stop-algorithm aria-label="Stop algorithm">
          <span aria-hidden="true"></span>
        </button>
      </div>
      <div id="train" class="train" aria-label="Looped train"></div>
      <div class="center-panel current-car-actions" aria-label="Current car controls">
        <button class="icon-button" type="button" data-move="-1" aria-label="Previous car">
          <span class="arrow-icon arrow-icon--left" aria-hidden="true"></span>
        </button>

        <button class="icon-button light-toggle" type="button" data-current-light-toggle aria-label="Toggle current car light">
          <span class="bulb-icon" aria-hidden="true"></span>
        </button>

        <button class="icon-button" type="button" data-move="1" aria-label="Next car">
          <span class="arrow-icon arrow-icon--right" aria-hidden="true"></span>
        </button>
      </div>
      <p id="summary" class="summary"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
